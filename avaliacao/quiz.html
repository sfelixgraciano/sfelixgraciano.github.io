<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --azul: #0f172a;
            --azul2: #1e3a8a;
            --laranja: #f97316;
            --verde: #22c55e;
            --vermelho: #ef4444;
            --card: #1e293b;
            --text: #e2e8f0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--azul), var(--azul2));
            color: var(--text);
            padding: 20px;
        }

        .quiz-container {
            max-width: 900px;
            margin: auto;
            background: #020617;
            padding: 25px;
            border-radius: 12px;
        }

        h1 {
            font-family: 'Orbitron';
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .question:hover {
            transform: scale(1.01);
        }

        .options li {
            list-style: none;
            margin: 8px 0;
        }

        label {
            display: block;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="radio"] {
            margin-right: 8px;
        }

        label:hover {
            background: rgba(249, 115, 22, 0.2);
        }

        .correct {
            background: rgba(34, 197, 94, 0.3);
            border-left: 4px solid var(--verde);
        }

        .wrong {
            background: rgba(239, 68, 68, 0.3);
            border-left: 4px solid var(--vermelho);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: linear-gradient(90deg, var(--laranja), #fb923c);
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
        }

        #summary {
            margin-top: 20px;
            padding: 15px;
            background: #020617;
            border-radius: 10px;
            display: none;
            animation: fadeIn 1s ease;
        }

        .fade {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            margin-bottom: 15px;
            background: linear-gradient(90deg, #1e3a8a, #0ea5e9);
            font-size: 14px;
            padding: 10px;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

                    "Na fase de criação de regras manuais da programação comum."
                ],
                "correct": 0,
                "topic": "Componentes de IA"
            },
            {
                "q": "Sistemas que reconhecem voz e traduzem textos usam:",
                "options": [
                    "Apenas regras matemáticas sem capacidade de aprendizado.",
                    "Técnicas de PLN para processar a linguagem humana.",
                    "Consciência artificial plena para entender sentimentos.",
                    "Hardwares que dispensam o uso de modelos ou datasets."
                ],
                "correct": 1,
                "topic": "PLN"
            },
            {
                "q": "A qualidade das respostas de uma IA depende de:",
                "options": [
                    "Treinamento otimizado e dados de alta integridade.",
                    "Número de cores presentes na logo da empresa criadora.",
                    "Velocidade de digitação do usuário que faz a pergunta.",
                    "Troca constante do modelo Llama 3 por modelos de visão."
                ],
                "correct": 0,
                "topic": "Treinamento e Performance"
            },
            {
                "q": "O termo ANI (Artificial Narrow Intelligence) refere-se a:",
                "options": [
                    "IA que possui inteligência geral superior à dos humanos.",
                    "IA especializada em tarefas específicas (IA Fraca).",
                    "Máquinas que conseguem pensar e sentir como seres vivos.",
                    "Sistemas que não utilizam Machine Learning para aprender."
                ],
                "correct": 1,
                "topic": "Categorias de IA"
            },
            {
                "q": "Qual o objetivo de otimizar chamadas entre usuário e motor?",
                "options": [
                    "Aumentar a latência para processar melhor os dados brutos.",
                    "Reduzir o tempo de viagem dos dados e acelerar a resposta.",
                    "Eliminar a necessidade de parâmetros ajustados no núcleo.",
                    "Permitir que o Hugging Face controle o hardware do usuário."
                ],
                "correct": 1,
                "topic": "Arquitetura de Sistemas"
            }
        ];

        const container = document.getElementById('questions');

        questionsData.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question fade';
            div.innerHTML = `<p><b>${i + 1}. ${q.q}</b></p>`;

            q.options.forEach((opt, j) => {
                div.innerHTML += `
        <label>
            <input type="radio" name="q${i}" value="${j}">
            ${opt}
        </label>`;
            });

            container.appendChild(div);
        });

        document.addEventListener('change', e => {
            if (e.target.type === "radio") {
                const labels = e.target.closest('.question').querySelectorAll('label');
                labels.forEach(l => l.style.background = "");
                e.target.parentElement.style.background = "rgba(249,115,22,0.3)";
            }
        });

        function calculateResult() {
            let score = 0;
            let topicStats = {};

            document.querySelectorAll('.question').forEach((div, i) => {
                const q = questionsData[i];
                const selected = div.querySelector('input:checked');

                if (!topicStats[q.topic]) topicStats[q.topic] = { correct: 0, total: 0 };
                topicStats[q.topic].total++;

                if (selected) {
                    if (parseInt(selected.value) === q.correct) {
                        score++;
                        topicStats[q.topic].correct++;
                        selected.parentElement.classList.add('correct');
                    } else {
                        selected.parentElement.classList.add('wrong');
                        div.querySelectorAll('input')[q.correct].parentElement.classList.add('correct');
                    }
                }
            });

            document.getElementById('result').innerHTML = `Você acertou ${score}/${questionsData.length}`;

            generateSummary(topicStats);
        }

        function generateSummary(stats) {
            let summary = "<h3>Resumo de estudo</h3>";

            let sorted = Object.entries(stats).sort((a, b) => {
                return (a[1].correct / a[1].total) - (b[1].correct / b[1].total);
            });

            summary += "<p><b>Pontos a reforçar:</b></p><ul>";
            sorted.slice(0, 3).forEach(([topic, data]) => {
                summary += `<li>${topic}</li>`;
            });
            summary += "</ul>";

            summary += "<p><b>Pontos fortes:</b></p><ul>";
            sorted.slice(-3).forEach(([topic, data]) => {
                summary += `<li>${topic}</li>`;
            });
            summary += "</ul>";

            document.getElementById('summary').innerHTML = summary;
            document.getElementById('summary').style.display = "block";
        }

        function goBack() {
            window.location.href = "ia.html";
        }
    </script>

</body>

</html>
